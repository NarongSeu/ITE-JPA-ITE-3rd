file:
  client-path: /file
  storage-location: D:\ite
  base-uri: http://localhost:${server.port}${file.client-path}/


spring:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${URL}
    username: ${USERNAME}
    password: ${PASSWORD}
  application:
    name: ITE-JPA
  threads:
    virtual:
      enabled: true
server:
  port: 7777


